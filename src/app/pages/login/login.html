<div class="login-container d-flex flex-column align-items-center justify-content-center vh-100 bg-light">
  
  <div class="mb-4 text-center">
    <img src="logo_tcp.webp" alt="Logo TCP" class="img-logo animate-fade-in" />
  </div>

  <div class="card shadow p-4 border-0 auth-card">
    <h2 class="card-title text-start mb-4 fs-4 fw-semibold text-dark">Login</h2>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      
      <div class="mb-3 position-relative border-bottom">
        <input 
          type="text" 
          formControlName="username" 
          class="form-control border-0 px-0 custom-input" 
          placeholder="User Name" 
          autocomplete="off">
      </div>

      <div class="mb-4 position-relative border-bottom">
        <input 
          type="password" 
          formControlName="password" 
          class="form-control border-0 px-0 custom-input" 
          placeholder="Password">
      </div>

      @if (errorMessage()) {
        <div class="alert alert-danger py-2 px-3 fs-7 border-0 rounded text-center mb-3">
          {{ errorMessage() }}
        </div>
      }

      <div class="d-flex justify-content-end mt-4">
        <button 
          type="submit" 
          [disabled]="loginForm.invalid || isLoading()" 
          class="btn text-white px-4 py-2 custom-btn shadow-sm">
          @if (isLoading()) {
            <span class="spinner-border spinner-border-sm me-2"></span>
          }
          Login
        </button>
      </div>

    </form>
  </div>
</div>
